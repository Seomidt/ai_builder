<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cyan infinity loop (left) -->
  <g filter="url(#glow-cyan)">
    <path d="M 18 30 C 18 18 24 12 32 12 C 40 12 45 18 50 30 C 45 42 40 48 32 48 C 24 48 18 42 18 30 Z" 
          stroke="#22D3EE" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="30" r="2.5" fill="#22D3EE" opacity="0.8"/>
  </g>

  <!-- Gold infinity loop (right) -->
  <g filter="url(#glow-gold)">
    <path d="M 50 30 C 55 18 62 12 70 12 C 78 12 83 18 88 30 C 83 42 78 48 70 48 C 62 48 55 42 50 30 Z" 
          stroke="#F59E0B" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="70" cy="30" r="2.5" fill="#F59E0B" opacity="0.9"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="40" cy="16" r="1.2" fill="#22D3EE" opacity="0.4"/>
  <circle cx="75" cy="20" r="0.8" fill="#F59E0B" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="110" y="42" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-0.4" fill="#F3F4F6">Bliss<tspan fill="#22D3EE">Ops</tspan></text>
</svg>
